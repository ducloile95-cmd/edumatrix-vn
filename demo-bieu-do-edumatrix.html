<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo biểu đồ &amp; chuyển trang — Edumatrix-VN</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --motion-duration:220ms;
    --grad-page: radial-gradient(circle at 12% 5%, rgba(147,180,253,.24), transparent 30rem), radial-gradient(circle at 92% 18%, rgba(209,250,223,.3), transparent 28rem), #fafaf9;
  }
  *{ font-family:"Be Vietnam Pro",ui-sans-serif,system-ui,-apple-system,sans-serif; }
  body{ background:var(--grad-page); background-attachment:fixed; letter-spacing:-.005em; }
  .rounded-card{ border-radius:12px; }
  .rounded-input{ border-radius:8px; }
  .shadow-1{ box-shadow:0 4px 18px rgba(28,51,137,.07); }
  .shadow-2{ box-shadow:0 12px 32px rgba(28,51,137,.1); }
  .page-enter{ animation: page-enter 380ms cubic-bezier(.16,1,.3,1) both; }
  @keyframes page-enter{ from{ opacity:0; transform:translateY(14px) scale(.992);} to{ opacity:1; transform:translateY(0) scale(1);} }
  .chart-card{ animation: chart-in 480ms cubic-bezier(.16,1,.3,1) both; animation-delay:calc(var(--i,0) * 90ms); }
  @keyframes chart-in{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; } }
  .nav-item{ transition:background-color var(--motion-duration), color var(--motion-duration); }
  .nav-item.active{ background:#EFF4FF; color:#1D39AC; font-weight:600; }
  .nav-item:not(.active):hover{ background:#FAFAF9; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#D3D0CB; border-radius:8px; }
</style>
</head>
<body class="text-neutral-800 antialiased">

<div class="min-h-screen lg:flex max-w-[1400px] mx-auto">

  <aside class="hidden lg:flex w-60 flex-none flex-col border-r border-neutral-200 bg-white/70 backdrop-blur px-3 py-5">
    <div class="mb-6 flex items-center gap-2 px-2">
      <span class="flex h-8 w-8 items-center justify-center rounded-input bg-primary-500 text-sm font-bold text-white">E</span>
      <span class="text-sm font-bold text-neutral-900">Edumatrix-VN</span>
    </div>
    <nav id="sidebar-nav" class="flex flex-col gap-1 text-sm"></nav>
    <div class="mt-auto rounded-card border border-dashed border-neutral-300 p-3 text-xs text-neutral-500">
      Demo minh hoạ: hiệu ứng chuyển trang + biểu đồ đề xuất. Dữ liệu là số mẫu.
    </div>
  </aside>

  <div class="flex min-h-screen min-w-0 flex-1 flex-col">
    <header class="flex h-14 flex-none items-center justify-between border-b border-neutral-200 bg-white/70 backdrop-blur px-4 lg:px-6">
      <span class="text-xs font-medium text-neutral-500">Bản demo Frontend — không kết nối dữ liệu thật</span>
      <span class="flex h-8 w-8 items-center justify-center rounded-full bg-primary-50 text-xs font-bold text-primary-700">AD</span>
    </header>

    <main id="main-content" class="page-enter w-full flex-1 px-4 py-6 sm:px-6 lg:px-8 lg:py-8"></main>
  </div>
</div>

<script>
const TONE = {
  primary:{ hex:"#3366F0", bg:"bg-primary-50", text:"text-primary-500" },
  accent:{ hex:"#FF8A3D", bg:"bg-accent-50", text:"text-accent-700" },
  success:{ hex:"#16A34A", bg:"bg-success-50", text:"text-success-700" },
  warning:{ hex:"#F59E0B", bg:"bg-warning-50", text:"text-warning-700" },
  danger:{ hex:"#E4453A", bg:"bg-danger-50", text:"text-danger-700" },
  info:{ hex:"#0EA5E9", bg:"bg-info-50", text:"text-info-700" },
};
const REDUCED_MOTION = matchMedia("(prefers-reduced-motion: reduce)").matches;
Chart.defaults.font.family = "'Be Vietnam Pro',ui-sans-serif,system-ui";
Chart.defaults.color = "#78746D";
Chart.defaults.animation = REDUCED_MOTION ? false : { duration: 700, easing: "easeOutQuart" };

const TABS = [
  { id:"dashboard", label:"Tổng quan", desc:"Số liệu vận hành hôm nay và xu hướng gần đây." },
  { id:"attendance", label:"Điểm danh", desc:"Tỉ lệ chuyên cần theo thời gian và trạng thái." },
  { id:"invoices", label:"Học phí", desc:"Doanh thu theo tháng và tình trạng công nợ." },
  { id:"scores", label:"Điểm số", desc:"Tiến bộ điểm trung bình và phân phối điểm học sinh." },
  { id:"assignments", label:"Bài tập", desc:"Tiến độ giao — nộp — chấm bài theo lớp." },
];

let activeCharts = [];
function destroyCharts(){ activeCharts.forEach(c => c.destroy()); activeCharts = []; }

function statCard(tone,value,label,hint){
  const t = TONE[tone];
  return `<div class="rounded-card border border-neutral-200 bg-white p-4 shadow-1">
    <span class="mb-2 flex h-9 w-9 items-center justify-center rounded-input ${t.bg} ${t.text} text-sm font-bold">●</span>
    <p class="text-2xl font-bold tabular-nums text-neutral-900">${value}</p>
    <p class="text-sm font-semibold text-neutral-700">${label}</p>
    <p class="text-xs text-neutral-500">${hint}</p>
  </div>`;
}
function chartCard(title,sub,canvasId,height,i){
  return `<section class="chart-card rounded-card border border-neutral-200 bg-white p-4 shadow-1" style="--i:${i}">
    <h2 class="text-base font-semibold text-neutral-900">${title}</h2>
    <p class="mb-3 text-xs text-neutral-500">${sub}</p>
    <div style="height:${height}px"><canvas id="${canvasId}"></canvas></div>
  </section>`;
}
function legend(items){
  return `<div class="mt-3 flex flex-wrap gap-x-4 gap-y-1 text-xs text-neutral-600">` +
    items.map(it => `<span class="flex items-center gap-1.5"><span class="h-2.5 w-2.5 rounded-sm" style="background:${it.color}"></span>${it.label}</span>`).join("") +
    `</div>`;
}

const RENDERERS = {
  dashboard(){
    document.getElementById("main-content").innerHTML = `
      <h1 class="text-2xl font-semibold tracking-[-0.02em] text-neutral-900 sm:text-[28px]">Tổng quan</h1>
      <p class="mt-1 text-sm text-neutral-500">Những việc cần chú ý hôm nay, lịch lớp sắp tới và xu hướng vận hành.</p>
      <div class="mt-5 grid grid-cols-2 gap-3 md:grid-cols-4">
        ${statCard("primary","6","Lớp hôm nay","4 đã xong · 2 sắp tới")}
        ${statCard("warning","3","Vắng/muộn hôm nay","trên các buổi đã điểm danh")}
        ${statCard("accent","12","Bài chưa chấm","tổng các lớp")}
        ${statCard("danger","5","Hóa đơn chờ","cần đối soát")}
      </div>
      <div class="mt-4 grid gap-4 lg:grid-cols-2">
        ${chartCard("Xu hướng chuyên cần 14 ngày qua","Line chart — phát hiện sớm nếu tỉ lệ đi học giảm dần.","c-dash-1",240,0)}
        ${chartCard("Hóa đơn theo trạng thái","Bar chart ngang — số hóa đơn cần đối soát nổi bật ngay.","c-dash-2",240,1)}
      </div>`;
    const days = Array.from({length:14},(_,i)=>`${i+1}/7`);
    const attendance = [92,90,94,88,85,90,96,91,87,93,89,86,90,94];
    activeCharts.push(new Chart(document.getElementById("c-dash-1"),{
      type:"line",
      data:{ labels:days, datasets:[{ label:"% có mặt", data:attendance, borderColor:TONE.primary.hex, backgroundColor:"rgba(51,102,240,.12)", fill:true, tension:.35, pointRadius:0, borderWidth:2 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(c)=>` ${c.parsed.y}% có mặt` } } },
        scales:{ y:{ min:60, max:100, ticks:{ callback:(v)=>v+"%" }, grid:{ color:"#F4F3F1" } }, x:{ grid:{ display:false } } } }
    }));
    activeCharts.push(new Chart(document.getElementById("c-dash-2"),{
      type:"bar",
      data:{ labels:["Đã thanh toán","Chờ xác nhận","Chưa thanh toán","Quá hạn","Từ chối"],
        datasets:[{ data:[34,5,9,3,1], backgroundColor:[TONE.success.hex,TONE.info.hex,TONE.warning.hex,TONE.danger.hex,"#A6A29C"], borderRadius:4, maxBarThickness:22 }]},
      options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
        scales:{ x:{ grid:{ color:"#F4F3F1" } }, y:{ grid:{ display:false } } } }
    }));
  },
  attendance(){
    document.getElementById("main-content").innerHTML = `
      <h1 class="text-2xl font-semibold tracking-[-0.02em] text-neutral-900 sm:text-[28px]">Điểm danh</h1>
      <p class="mt-1 text-sm text-neutral-500">Theo dõi chuyên cần theo tuần và tổng hợp theo trạng thái.</p>
      <div class="mt-5 grid gap-4 lg:grid-cols-[1.4fr_1fr]">
        ${chartCard("Chuyên cần theo tuần (4 tuần gần nhất)","Stacked bar chart — thấy ngay tuần nào tăng vắng/muộn.","c-att-1",260,0)}
        ${chartCard("Tổng hợp trạng thái kỳ này","Donut chart — tỉ lệ tổng thể, 4 nhóm nên dùng donut vẫn rõ.","c-att-2",260,1)}
      </div>`;
    activeCharts.push(new Chart(document.getElementById("c-att-1"),{
      type:"bar",
      data:{ labels:["Tuần 1","Tuần 2","Tuần 3","Tuần 4"],
        datasets:[
          { label:"Có mặt", data:[142,138,145,140], backgroundColor:TONE.success.hex },
          { label:"Muộn", data:[8,10,6,9], backgroundColor:TONE.warning.hex },
          { label:"Vắng có phép", data:[4,5,3,4], backgroundColor:TONE.info.hex },
          { label:"Vắng không phép", data:[2,3,2,3], backgroundColor:TONE.danger.hex },
        ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"top", labels:{ boxWidth:10, boxHeight:10, usePointStyle:false } } },
        scales:{ x:{ stacked:true, grid:{display:false} }, y:{ stacked:true, grid:{ color:"#F4F3F1" } } } }
    }));
    activeCharts.push(new Chart(document.getElementById("c-att-2"),{
      type:"doughnut",
      data:{ labels:["Có mặt","Muộn","Vắng có phép","Vắng không phép"],
        datasets:[{ data:[88,5,4,3], backgroundColor:[TONE.success.hex,TONE.warning.hex,TONE.info.hex,TONE.danger.hex], borderColor:"#fff", borderWidth:2 }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:"68%", plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, boxHeight:10 } },
        tooltip:{ callbacks:{ label:(c)=>` ${c.label}: ${c.parsed}%` } } } }
    }));
  },
  invoices(){
    document.getElementById("main-content").innerHTML = `
      <h1 class="text-2xl font-semibold tracking-[-0.02em] text-neutral-900 sm:text-[28px]">Học phí</h1>
      <p class="mt-1 text-sm text-neutral-500">Doanh thu theo tháng và tình trạng công nợ hiện tại.</p>
      <div class="mt-5 grid gap-4 lg:grid-cols-[1.4fr_1fr]">
        ${chartCard("Doanh thu dự kiến so với thực thu","Grouped bar chart — chênh lệch = tiền đang bị treo.","c-inv-1",260,0)}
        ${chartCard("Hóa đơn theo trạng thái hiện tại","Bar chart ngang — ưu tiên xử lý nhóm quá hạn trước.","c-inv-2",260,1)}
      </div>`;
    activeCharts.push(new Chart(document.getElementById("c-inv-1"),{
      type:"bar",
      data:{ labels:["T2","T3","T4","T5","T6","T7"],
        datasets:[
          { label:"Dự kiến (triệu đ)", data:[180,195,210,205,220,230], backgroundColor:"#BFD3FE", borderRadius:4, maxBarThickness:18 },
          { label:"Thực thu (triệu đ)", data:[165,188,190,198,205,0], backgroundColor:TONE.primary.hex, borderRadius:4, maxBarThickness:18 },
        ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"top", labels:{ boxWidth:10, boxHeight:10 } } },
        scales:{ y:{ grid:{ color:"#F4F3F1" }, ticks:{ callback:(v)=>v+"tr" } }, x:{ grid:{ display:false } } } }
    }));
    activeCharts.push(new Chart(document.getElementById("c-inv-2"),{
      type:"bar",
      data:{ labels:["Đã thanh toán","Chờ xác nhận","Chưa thanh toán","Quá hạn","Từ chối"],
        datasets:[{ data:[34,5,9,3,1], backgroundColor:[TONE.success.hex,TONE.info.hex,TONE.warning.hex,TONE.danger.hex,"#A6A29C"], borderRadius:4, maxBarThickness:22 }]},
      options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
        scales:{ x:{ grid:{ color:"#F4F3F1" } }, y:{ grid:{ display:false } } } }
    }));
  },
  scores(){
    document.getElementById("main-content").innerHTML = `
      <h1 class="text-2xl font-semibold tracking-[-0.02em] text-neutral-900 sm:text-[28px]">Điểm số</h1>
      <p class="mt-1 text-sm text-neutral-500">Tiến bộ điểm trung bình lớp và phân phối điểm học sinh.</p>
      <div class="mt-5 grid gap-4 lg:grid-cols-[1.4fr_1fr]">
        ${chartCard("Tiến bộ điểm trung bình lớp","Line chart — đã có trong Điểm số, giữ nguyên kiểu hiển thị.","c-sco-1",260,0)}
        ${chartCard("Phân phối điểm bài kiểm tra gần nhất","Bar chart (histogram) — thấy nhóm học sinh yếu cần hỗ trợ.","c-sco-2",260,1)}
      </div>`;
    activeCharts.push(new Chart(document.getElementById("c-sco-1"),{
      type:"line",
      data:{ labels:["Quiz 1","Quiz 2","Giữa kỳ","Quiz 3","Quiz 4","Cuối kỳ"],
        datasets:[{ data:[72,75,70,78,81,84], borderColor:TONE.primary.hex, backgroundColor:"rgba(51,102,240,.1)", fill:true, tension:.3, pointRadius:3, pointBackgroundColor:TONE.primary.hex, borderWidth:2 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
        scales:{ y:{ min:0, max:100, ticks:{ callback:(v)=>v+"%" }, grid:{ color:"#F4F3F1" } }, x:{ grid:{ display:false } } } }
    }));
    activeCharts.push(new Chart(document.getElementById("c-sco-2"),{
      type:"bar",
      data:{ labels:["<5","5–6.5","6.5–8","8–9","9–10"],
        datasets:[{ data:[3,7,14,9,4], backgroundColor:[TONE.danger.hex,TONE.warning.hex,TONE.info.hex,TONE.primary.hex,TONE.success.hex], borderRadius:4, maxBarThickness:32 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(c)=>` ${c.parsed.y} học sinh` } } },
        scales:{ y:{ grid:{ color:"#F4F3F1" } }, x:{ grid:{ display:false } } } }
    }));
  },
  assignments(){
    document.getElementById("main-content").innerHTML = `
      <h1 class="text-2xl font-semibold tracking-[-0.02em] text-neutral-900 sm:text-[28px]">Bài tập</h1>
      <p class="mt-1 text-sm text-neutral-500">Tiến độ giao — nộp — chấm bài, và so sánh tỉ lệ hoàn thành giữa các lớp.</p>
      <div class="mt-5 grid gap-4 lg:grid-cols-[1.1fr_1.3fr]">
        ${chartCard("Tiến độ xử lý bài tập (dạng phễu)","Horizontal bar giảm dần — mô phỏng phễu Giao→Nộp→Chấm.","c-asg-1",260,0)}
        ${chartCard("Tỉ lệ hoàn thành theo lớp","Bar chart so sánh — lớp nào cần nhắc nhở thêm.","c-asg-2",260,1)}
      </div>`;
    activeCharts.push(new Chart(document.getElementById("c-asg-1"),{
      type:"bar",
      data:{ labels:["Giao bài","Đã nộp","Đã chấm","Cần làm lại"],
        datasets:[{ data:[32,27,22,4], backgroundColor:["#93B4FD","#6090FA",TONE.primary.hex,TONE.danger.hex], borderRadius:4, maxBarThickness:26 }]},
      options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
        scales:{ x:{ grid:{ color:"#F4F3F1" } }, y:{ grid:{ display:false } } } }
    }));
    activeCharts.push(new Chart(document.getElementById("c-asg-2"),{
      type:"bar",
      data:{ labels:["10A1","10A2","11B1","11B2","12C1"],
        datasets:[{ label:"% đã nộp đúng hạn", data:[92,78,85,64,97], backgroundColor:TONE.primary.hex, borderRadius:4, maxBarThickness:28 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(c)=>` ${c.parsed.y}% đúng hạn` } } },
        scales:{ y:{ min:0, max:100, ticks:{ callback:(v)=>v+"%" }, grid:{ color:"#F4F3F1" } }, x:{ grid:{ display:false } } } }
    }));
  },
};

function renderTab(id){
  destroyCharts();
  const main = document.getElementById("main-content");
  main.classList.remove("page-enter");
  void main.offsetWidth;
  RENDERERS[id]();
  main.classList.add("page-enter");
  document.querySelectorAll(".nav-item").forEach(el => el.classList.toggle("active", el.dataset.tab === id));
}

document.getElementById("sidebar-nav").innerHTML = TABS.map(t =>
  `<button data-tab="${t.id}" class="nav-item flex min-h-[40px] items-center rounded-input px-3 text-left text-neutral-700">${t.label}</button>`
).join("");
document.querySelectorAll(".nav-item").forEach(btn => btn.addEventListener("click", () => renderTab(btn.dataset.tab)));

renderTab("dashboard");
</script>
</body>
</html>

<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edumatrix VN - Roadmap nang cap</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #f0f4fb;
      --line: #d9e2ef;
      --text: #172033;
      --muted: #5d6b82;
      --accent: #2957d8;
      --accent-soft: #e7efff;
      --success: #157347;
      --success-soft: #e6f4ec;
      --warning: #9a6200;
      --warning-soft: #fff3d8;
      --danger: #b42318;
      --danger-soft: #ffe7e3;
      --radius: 12px;
      font-family: "Be Vietnam Pro", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    button, input, select { font: inherit; }
    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }
    button:hover { border-color: #9eb2d2; }
    button:active { transform: translateY(1px); }
    button[aria-pressed="true"], .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .app {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      padding: 22px 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
    }

    .meta {
      display: grid;
      gap: 4px;
      min-width: 240px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .meta strong { font-size: 13px; }
    .meta span { color: var(--muted); font-size: 13px; }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      padding: 12px;
      margin: 0 0 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      backdrop-filter: blur(12px);
    }

    .toolbar input, .toolbar select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .metric b {
      display: block;
      font-size: 30px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .phase-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .phase-card {
      display: grid;
      gap: 10px;
      width: 100%;
      padding: 14px;
      text-align: left;
      border-radius: 10px;
    }

    .phase-card strong { font-size: 15px; }
    .phase-card small { color: var(--muted); }
    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e4ebf5;
    }

    .bar {
      height: 100%;
      width: var(--value);
      background: var(--accent);
    }

    .phase-flow {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .flow-node {
      min-height: 110px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .flow-node strong { display: block; margin: 4px 0; }
    .flow-node small { color: var(--muted); }

    .task-grid {
      display: grid;
      gap: 10px;
    }

    .task {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .task h3 {
      margin: 0 0 5px;
      font-size: 16px;
    }

    .task p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .todo { background: var(--surface-soft); color: var(--muted); }
    .active { background: var(--accent-soft); color: var(--accent); }
    .review { background: var(--warning-soft); color: var(--warning); }
    .done { background: var(--success-soft); color: var(--success); }
    .blocked { background: var(--danger-soft); color: var(--danger); }
    .priority { background: #eef1f6; color: #3d495e; }

    .task-detail {
      display: grid;
      gap: 12px;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .box {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
    }

    .box h4 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    .box p, .box li {
      color: var(--muted);
      font-size: 13px;
    }

    .box p { margin: 0; }
    ul { margin: 0; padding-left: 18px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      display: block;
      padding: 10px;
      border-radius: 8px;
      background: #111827;
      color: #f8fafc;
      overflow-x: auto;
      white-space: pre;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
    }

    .history {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .history-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      font-size: 13px;
    }

    .history-item span {
      color: var(--muted);
      display: block;
      margin-top: 3px;
    }

    @media (max-width: 1050px) {
      .hero, .layout, .detail-grid, .toolbar { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 20px, 1440px); padding-top: 10px; }
      .summary { grid-template-columns: 1fr; }
      .task { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Roadmap nâng cấp Edumatrix VN</h1>
        <p>Kế hoạch theo phase: phân tích, thực hiện, test, ghi evidence và cập nhật roadmap sau khi công việc hoàn thành.</p>
      </div>
      <div class="meta" id="roadmapMeta"></div>
    </section>

    <section class="toolbar" aria-label="Bộ lọc roadmap">
      <input id="searchInput" type="search" placeholder="Tìm task, phase, file hoặc khu vực">
      <select id="statusFilter" aria-label="Lọc trạng thái"></select>
      <select id="phaseFilter" aria-label="Lọc phase"></select>
    </section>

    <section class="summary" id="summary"></section>

    <section class="phase-flow" id="phaseFlow" aria-label="Diagram phase"></section>

    <section class="layout">
      <aside class="panel">
        <div class="panel-head"><h2>Phase</h2></div>
        <div class="phase-list" id="phaseList"></div>
      </aside>

      <section>
        <div class="task-grid" id="taskGrid"></div>
        <article class="task-detail" id="taskDetail"></article>
      </section>
    </section>

    <section class="panel" style="margin-top:16px">
      <div class="panel-head"><h2>Lịch sử cập nhật</h2></div>
      <div class="history" id="history"></div>
    </section>
  </main>

  </script>
  <script>
    const state = JSON.parse(document.getElementById("roadmap-state").textContent);
    let activePhaseId = state.phases[0]?.id ?? "";
    let activeTaskId = state.phases[0]?.tasks[0]?.id ?? "";

    const labels = {
      todo: "Chưa làm",
      active: "Đang làm",
      review: "Chờ test",
      done: "Hoàn thành",
      blocked: "Bị chặn"
    };

    const $ = (id) => document.getElementById(id);
    const allTasks = () => state.phases.flatMap((phase) => phase.tasks.map((task) => ({ phase, task })));
    const taskProgress = (phase) => {
      if (!phase.tasks.length) return 0;
      return Math.round((phase.tasks.filter((task) => task.status === "done").length / phase.tasks.length) * 100);
    };
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));
    const repoLink = (file) => {
      const safe = escapeHtml(file);
      return `<a href="../${safe}">${safe}</a>`;
    };

    function updateCommand(taskId, status = "done") {
      return `npm run roadmap:update -- ${taskId} ${status} --test "COMMAND PASS" --link "PATH"`;
    }

    function renderMeta() {
      const updated = new Date(state.lastUpdatedAt).toLocaleString("vi-VN");
      $("roadmapMeta").innerHTML = `
        <strong>${escapeHtml(state.project)}</strong>
        <span>Cập nhật: ${updated}</span>
        <span>Owner: ${escapeHtml(state.owner)}</span>
      `;
    }

    function renderFilters() {
      $("statusFilter").innerHTML = `
        <option value="">Tất cả trạng thái</option>
        ${Object.entries(labels).map(([value, label]) => `<option value="${value}">${label}</option>`).join("")}
      `;
      $("phaseFilter").innerHTML = `
        <option value="">Tất cả phase</option>
        ${state.phases.map((phase) => `<option value="${phase.id}">${escapeHtml(phase.name)}</option>`).join("")}
      `;
    }

    function renderSummary() {
      const tasks = allTasks();
      const done = tasks.filter(({ task }) => task.status === "done").length;
      const active = tasks.filter(({ task }) => task.status === "active").length;
      const blocked = tasks.filter(({ task }) => task.status === "blocked").length;
      $("summary").innerHTML = [
        ["Phase", state.phases.length, "Tổng số giai đoạn"],
        ["Task", tasks.length, "Tổng số đầu việc"],
        ["Done", done, `${Math.round((done / Math.max(tasks.length, 1)) * 100)}% hoàn thành`],
        ["Active", active + blocked, blocked ? `${blocked} task bị chặn` : "Đang triển khai"]
      ].map(([label, value, hint]) => `
        <article class="metric">
          <b>${value}</b>
          <span>${label}: ${hint}</span>
        </article>
      `).join("");
    }

    function renderPhaseFlow() {
      $("phaseFlow").innerHTML = state.phases.map((phase) => `
        <button class="flow-node" aria-pressed="${phase.id === activePhaseId}" data-phase="${phase.id}">
          <span class="pill ${phase.status}">${labels[phase.status] ?? phase.status}</span>
          <strong>${escapeHtml(phase.name)}</strong>
          <small>${taskProgress(phase)}% - ${escapeHtml(phase.window)}</small>
        </button>
      `).join("");
    }

    function renderPhases() {
      $("phaseList").innerHTML = state.phases.map((phase) => `
        <button class="phase-card" aria-pressed="${phase.id === activePhaseId}" data-phase="${phase.id}">
          <span class="pill ${phase.status}">${labels[phase.status] ?? phase.status}</span>
          <strong>${escapeHtml(phase.name)}</strong>
          <small>${escapeHtml(phase.goal)}</small>
          <span class="progress" aria-hidden="true"><span class="bar" style="--value:${taskProgress(phase)}%"></span></span>
        </button>
      `).join("");
    }

    function filteredTasks() {
      const query = $("searchInput").value.trim().toLowerCase();
      const status = $("statusFilter").value;
      const phaseId = $("phaseFilter").value || activePhaseId;

      return allTasks().filter(({ phase, task }) => {
        const haystack = [phase.name, phase.goal, task.id, task.title, task.area, task.analysis, task.implementation, ...(task.links ?? [])].join(" ").toLowerCase();
        return (!phaseId || phase.id === phaseId)
          && (!status || task.status === status)
          && (!query || haystack.includes(query));
      });
    }

    function renderTasks() {
      const rows = filteredTasks();
      if (!rows.length) {
        $("taskGrid").innerHTML = `<article class="task"><p>Không có task khớp bộ lọc.</p></article>`;
        $("taskDetail").innerHTML = "";
        return;
      }
      if (!rows.some(({ task }) => task.id === activeTaskId)) activeTaskId = rows[0].task.id;

      $("taskGrid").innerHTML = rows.map(({ phase, task }) => `
        <button class="task" aria-pressed="${task.id === activeTaskId}" data-task="${task.id}">
          <span class="pill ${task.status}">${labels[task.status] ?? task.status}</span>
          <span>
            <h3>${escapeHtml(task.id)} - ${escapeHtml(task.title)}</h3>
            <p>${escapeHtml(phase.name)} - ${escapeHtml(task.area)}</p>
          </span>
          <span class="pill priority">${escapeHtml(task.priority)}</span>
        </button>
      `).join("");
      renderDetail();
    }

    function renderDetail() {
      const found = allTasks().find(({ task }) => task.id === activeTaskId);
      if (!found) return;
      const { phase, task } = found;
      $("taskDetail").innerHTML = `
        <div>
          <span class="pill ${task.status}">${labels[task.status] ?? task.status}</span>
          <h2>${escapeHtml(task.id)} - ${escapeHtml(task.title)}</h2>
          <p>${escapeHtml(phase.name)} - ${escapeHtml(task.area)} - ${escapeHtml(task.priority)}</p>
        </div>
        <div class="detail-grid">
          <section class="box"><h4>Phân tích</h4><p>${escapeHtml(task.analysis)}</p></section>
          <section class="box"><h4>Thực hiện</h4><p>${escapeHtml(task.implementation)}</p></section>
          <section class="box"><h4>Test bắt buộc</h4><ul>${(task.tests ?? []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></section>
          <section class="box"><h4>Link công việc</h4><ul>${(task.links ?? []).map((item) => `<li>${repoLink(item)}</li>`).join("")}</ul></section>
        </div>
        <section class="box">
          <h4>Command cập nhật khi hoàn thành</h4>
          <code>${escapeHtml(updateCommand(task.id, "done"))}</code>
        </section>
        <section class="box">
          <h4>Evidence</h4>
          ${(task.evidence ?? []).length
            ? `<ul>${task.evidence.map((item) => `<li>${escapeHtml(item.at)} - ${escapeHtml(item.status)} - ${escapeHtml(item.note || item.test || "Đã cập nhật")}</li>`).join("")}</ul>`
            : "<p>Chưa có evidence.</p>"
          }
        </section>
      `;
    }

    function renderHistory() {
      $("history").innerHTML = (state.history ?? []).slice(0, 20).map((item) => `
        <article class="history-item">
          <strong>${escapeHtml(item.taskId)} -> ${escapeHtml(item.status)}</strong>
          <span>${escapeHtml(item.at)} ${item.note ? "- " + escapeHtml(item.note) : ""}</span>
          ${item.test ? `<span>Test: ${escapeHtml(item.test)}</span>` : ""}
          ${item.link ? `<span>Link: ${escapeHtml(item.link)}</span>` : ""}
        </article>
      `).join("") || `<article class="history-item">Chưa có lịch sử.</article>`;
    }

    function renderAll() {
      renderMeta();
      renderSummary();
      renderPhaseFlow();
      renderPhases();
      renderTasks();
      renderHistory();
    }

    document.addEventListener("click", (event) => {
      const phaseButton = event.target.closest("[data-phase]");
      if (phaseButton) {
        activePhaseId = phaseButton.dataset.phase;
        $("phaseFilter").value = activePhaseId;
        activeTaskId = state.phases.find((phase) => phase.id === activePhaseId)?.tasks[0]?.id ?? activeTaskId;
        renderAll();
      }
      const taskButton = event.target.closest("[data-task]");
      if (taskButton) {
        activeTaskId = taskButton.dataset.task;
        renderTasks();
      }
    });

    ["input", "change"].forEach((eventName) => {
      $("searchInput").addEventListener(eventName, renderTasks);
      $("statusFilter").addEventListener(eventName, renderTasks);
      $("phaseFilter").addEventListener(eventName, () => {
        activePhaseId = $("phaseFilter").value || activePhaseId;
        renderTasks();
      });
    });

    renderFilters();
    renderAll();
  </script>
</body>
</html>

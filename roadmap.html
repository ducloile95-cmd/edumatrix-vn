<style>
  :root {
    --primary-50: #EFF4FF; --primary-100: #DBE6FE; --primary-200: #BFD3FE;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', ui-sans-serif, system-ui, -apple-system, sans-serif;

  }
  a { color: var(--primary-700); }

  header.top {
    position: sticky; top: 0; z-index: 20;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-200);
    padding: 14px 20px;
  }
  .top-inner { max-width: 980px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 12px 20px; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 9px; background: var(--primary-500);
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .brand h1 { font-size: 16px; margin: 0; font-weight: 600; color: var(--neutral-900); }
  .brand p { margin: 0; font-size: 12px; color: var(--neutral-500); }

  .overall-progress { display: flex; align-items: center; gap: 10px; min-width: 220px; flex: 1; max-width: 340px; }
  .overall-progress .bar { flex: 1; height: 10px; border-radius: 999px; background: var(--neutral-200); overflow: hidden; }
  .overall-progress .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--primary-500), var(--primary-600)); border-radius: 999px; transition: width .3s ease; }
  .overall-progress .pct { font-size: 13px; font-weight: 600; color: var(--primary-700); min-width: 38px; text-align: right; }

  main { max-width: 980px; margin: 0 auto; padding: 20px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat-card { background: var(--neutral-0); border: 1px solid var(--neutral-200); border-radius: var(--r-card); padding: 12px 14px; }
  .stat-card .n { font-size: 22px; font-weight: 700; color: var(--neutral-900); }
  .stat-card .l { font-size: 12px; color: var(--neutral-500); margin-top: 2px; }
  .stat-card.done .n { color: var(--success-700); }
  .stat-card.progress .n { color: var(--warning-700); }
  .stat-card.todo .n { color: var(--neutral-500); }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .filter-btn {
    border: 1px solid var(--neutral-300); background: var(--neutral-0); color: var(--neutral-600);
    border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .filter-btn[aria-pressed="true"] { background: var(--primary-500); border-color: var(--primary-500); color: #fff; }
  .toolbar .spacer { flex: 1; }
  .btn-ghost {
    border: 1px solid var(--neutral-300); background: var(--neutral-0); color: var(--neutral-700);
    border-radius: var(--r-input); padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
    min-height: 32px;
  }
  .btn-ghost:hover { background: var(--neutral-100); }

  .timeline { position: relative; padding-left: 22px; }
  .timeline::before {
    content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--neutral-200);
  }

  .phase {
    position: relative; background: var(--neutral-0); border: 1px solid var(--neutral-200);
    border-radius: var(--r-card); margin-bottom: 14px; overflow: hidden;
  }
  .phase::before {
    content: ""; position: absolute; left: -22px; top: 22px; width: 14px; height: 14px; border-radius: 50%;
    background: var(--neutral-0); border: 3px solid var(--neutral-300);
  }
  .phase.status-done::before { border-color: var(--success-500); }
  .phase.status-progress::before { border-color: var(--warning-500); }

  .phase-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .phase-code {
    font-size: 11px; font-weight: 700; color: var(--primary-700); background: var(--primary-50);
    border-radius: 999px; padding: 3px 10px; flex-shrink: 0; white-space: nowrap;
  }
  .phase-title { font-size: 15px; font-weight: 600; color: var(--neutral-900); flex: 1; min-width: 140px; }
  .badge { font-size: 11px; font-weight: 600; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
  .badge.todo { background: var(--neutral-100); color: var(--neutral-600); }
  .badge.progress { background: var(--warning-50); color: var(--warning-700); }
  .badge.done { background: var(--success-50); color: var(--success-700); }

  .phase-bar { width: 90px; height: 8px; border-radius: 999px; background: var(--neutral-200); overflow: hidden; flex-shrink: 0; }
  .phase-bar > span { display: block; height: 100%; border-radius: 999px; background: var(--primary-500); transition: width .3s ease; }
  .phase.status-done .phase-bar > span { background: var(--success-500); }
  .phase.status-progress .phase-bar > span { background: var(--warning-500); }
  .phase-pct { font-size: 12px; color: var(--neutral-500); width: 32px; text-align: right; flex-shrink: 0; }

  .chevron { width: 18px; height: 18px; flex-shrink: 0; transition: transform .2s ease; color: var(--neutral-400); }
  .phase.open .chevron { transform: rotate(90deg); }

  .phase-body { display: none; padding: 0 16px 18px; border-top: 1px solid var(--neutral-100); }
  .phase.open .phase-body { display: block; }

  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: var(--neutral-400); margin: 16px 0 8px;

  ul.checklist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  ul.checklist li { display: flex; align-items: flex-start; gap: 9px; padding: 6px 4px; border-radius: 8px; }
  ul.checklist li:hover { background: var(--neutral-50); }
  ul.checklist input[type="checkbox"] {
    margin-top: 2px; width: 17px; height: 17px; accent-color: var(--primary-500); flex-shrink: 0; cursor: pointer;

  ul.checklist input:checked + label { color: var(--neutral-400); text-decoration: line-through; }
  ul.checklist.criteria input[type="checkbox"] { accent-color: var(--success-500); }

  textarea.notes {

const STORAGE_KEY = "edumatrixRoadmapV1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { tasks: {}, criteria: {}, notes: {}, open: {} };
  } catch {
    return { tasks: {}, criteria: {}, notes: {}, open: {} };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let activeFilter = "all";

const timelineEl = document.getElementById("timeline");
const chevronSvg = '<svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function phaseStatus(p, idx) {
  const done = p.tasks.filter((_, i) => state.tasks[idx + "-" + i]).length;
  const pct = p.tasks.length ? Math.round((done / p.tasks.length) * 100) : 0;
  let status = "todo";
  if (pct === 100) status = "done";
  else if (pct > 0) status = "progress";
  return { done, total: p.tasks.length, pct, status };
}

function render() {
  timelineEl.innerHTML = "";
  let sDone = 0, sProgress = 0, sTodo = 0, totalTasks = 0, doneTasks = 0;

  PHASES.forEach((p, idx) => {
    const st = phaseStatus(p, idx);
    totalTasks += st.total;
    doneTasks += st.done;
    if (st.status === "done") sDone++;
    else if (st.status === "progress") sProgress++;
    else sTodo++;

    if (activeFilter !== "all" && activeFilter !== st.status) return;

    const isOpen = !!state.open[idx];
    const article = document.createElement("article");
    article.className = "phase status-" + st.status + (isOpen ? " open" : "");
    article.dataset.idx = idx;

    const criteriaDone = p.criteria.filter((_, i) => state.criteria[idx + "-" + i]).length;
    const statusLabel = st.status === "done" ? "Hoàn thành" : st.status === "progress" ? "Đang thực hiện" : "Chưa bắt đầu";

    article.innerHTML = `
      <div class="phase-head" data-toggle="${idx}">
        ${chevronSvg}
        <span class="phase-code">${p.code}</span>
        <span class="phase-title">${p.title}</span>
        <span class="badge ${st.status}">${statusLabel}</span>
        <div class="phase-bar"><span style="width:${st.pct}%"></span></div>
        <span class="phase-pct">${st.pct}%</span>
      </div>
      <div class="phase-body">
        <p class="section-label">Công việc (${st.done}/${st.total})</p>
        <ul class="checklist" data-kind="tasks" data-idx="${idx}">
          ${p.tasks.map((t, i) => `
            <li>
              <input type="checkbox" id="t-${idx}-${i}" ${state.tasks[idx + "-" + i] ? "checked" : ""} data-i="${i}" />
              <label for="t-${idx}-${i}">${t}</label>
            </li>`).join("")}
        </ul>
        <p class="section-label">Tiêu chí hoàn thành / đánh giá (${criteriaDone}/${p.criteria.length})</p>
        <ul class="checklist criteria" data-kind="criteria" data-idx="${idx}">
          ${p.criteria.map((c, i) => `
            <li>
              <input type="checkbox" id="c-${idx}-${i}" ${state.criteria[idx + "-" + i] ? "checked" : ""} data-i="${i}" />
              <label for="c-${idx}-${i}">${c}</label>
            </li>`).join("")}
        </ul>
        <p class="section-label">Ghi chú đánh giá</p>
        <textarea class="notes" data-idx="${idx}" placeholder="Nhận xét, rủi ro, việc còn thiếu cho phase này...">${state.notes[idx] || ""}</textarea>
      </div>
    `;
    timelineEl.appendChild(article);
  });

  document.getElementById("statDone").textContent = sDone;
  document.getElementById("statProgress").textContent = sProgress;
  document.getElementById("statTodo").textContent = sTodo;
  document.getElementById("statTasks").textContent = doneTasks + "/" + totalTasks;

  const overallPct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById("overallBar").style.width = overallPct + "%";
  document.getElementById("overallPct").textContent = overallPct + "%";
}

timelineEl.addEventListener("click", (e) => {
  const head = e.target.closest("[data-toggle]");
  if (head && !e.target.matches("input, label")) {
    const idx = head.dataset.toggle;
    state.open[idx] = !state.open[idx];
    saveState();
    render();
  }
});

timelineEl.addEventListener("change", (e) => {
  if (e.target.matches('input[type="checkbox"]')) {
    const ul = e.target.closest("ul.checklist");
    const idx = ul.dataset.idx, kind = ul.dataset.kind, i = e.target.dataset.i;
    state[kind][idx + "-" + i] = e.target.checked;
    saveState();
    render();
    const reopened = document.querySelector('.phase[data-idx="' + idx + '"]');
    if (reopened) { state.open[idx] = true; }
  }
});

timelineEl.addEventListener("input", (e) => {
  if (e.target.matches("textarea.notes")) {
    state.notes[e.target.dataset.idx] = e.target.value;
    saveState();
  }
});

document.querySelectorAll(".filter-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach((b) => b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
    render();
  });
});

document.getElementById("expandAllBtn").addEventListener("click", () => {
  const anyClosed = PHASES.some((_, idx) => !state.open[idx]);
  PHASES.forEach((_, idx) => { state.open[idx] = anyClosed; });
  document.getElementById("expandAllBtn").textContent = anyClosed ? "Thu gọn tất cả" : "Mở tất cả";
  saveState();
  render();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Xóa toàn bộ tiến độ đã tick trên trình duyệt này?")) {
    state = { tasks: {}, criteria: {}, notes: {}, open: {} };
    saveState();
    render();
  }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const report = PHASES.map((p, idx) => {
    const st = phaseStatus(p, idx);
    return {
      phase: p.code,
      title: p.title,
      status: st.status,
      progress: st.pct + "%",
      tasksDone: st.done,
      tasksTotal: st.total,
      note: state.notes[idx] || "",
    };
  });
  const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), phases: report }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "edumatrix-roadmap-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});

render();
</script>

</body>
</html>
